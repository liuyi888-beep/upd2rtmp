listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       info;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    gop_cache       on;

    play {
        gop_cache   on;
    }

    security {
        enabled     on;
        allow       play       all;
        allow       publish    127.0.0.1;
        allow       publish    10.0.0.0/8;
        allow       publish    172.16.0.0/12;
        allow       publish    192.168.0.0/16;
    }

    http_hooks {
        enabled     on;
        on_play     http://host.docker.internal:18090/srs/on_play;
        on_stop     http://host.docker.internal:18090/srs/on_stop;
    }
}
